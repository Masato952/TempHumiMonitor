<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Temperature & Humidity Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px;">
  <h2>Last 24 Hours Data</h2>
  <canvas id="chart" width="600" height="300"></canvas>

  <script>
    async function loadData() {
      const res = await fetch("/api/th");
      const data = await res.json();

      const labels = data.map(d => new Date(d.t).toLocaleTimeString());
      const temps  = data.map(d => d.temp);
      const humis  = data.map(d => d.humi);

      const ctx = document.getElementById("chart").getContext("2d");
      new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "Temperature", data: temps, borderColor:"red" },
            { label: "Humidity", data: humis, borderColor:"blue" }
          ]
        },
        options: { responsive: true }
      });
    }

    loadData();
  </script>
</body>
</html>
